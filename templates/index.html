pan><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"><span class="keyword">const</span> <span class="keyword">int</span> kMaxN = <span class="number">1000000</span> + <span class="number">10</span>;</span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">long</span> <span class="keyword">long</span> LL;</span><br><span class="line"><span class="keyword">const</span> LL kMod = <span class="number">998244353</span>;</span><br><span class="line"><span class="keyword">const</span> LL kPriRoot = <span class="number">3</span>;</span><br><span class="line"><span class="keyword">const</span> LL kPriRootInv = <span class="number">332748118</span>;</span><br><span class="line"><span class="function"><span class="keyword">inline</span> LL <span class="title">FastPow</span><span class="params">(LL x, LL k)</span> </span>&#123;</span><br><span class="line">  LL ans = <span class="number">1</span>;</span><br><span class="line">  <span class="keyword">for</span> (; k; k &gt;&gt;= <span class="number">1</span>) &#123;</span><br><span class="line">    <span class="keyword">if</span> (k &amp; <span class="number">1</span>) ans = ans * x % kMod;</span><br><span class="line">    x = x * x % kMod;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">return</span> ans;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">inline</span> LL <span class="title">FastAdd</span><span class="params">(LL x, LL y)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">return</span> (x += y) &lt; kMod ? x : x - kMod;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">inline</span> LL <span class="title">FastDec</span><span class="params">(LL x, LL y)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">return</span> (x -= y) &gt;= <span class="number">0</span> ? x : x + kMod;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">RaderSort</span><span class="params">(LL* a, <span class="keyword">int</span> n)</span> </span>&#123; <span class="comment">// Rader 排序的复杂度为 O(n)</span></span><br><span class="line">  <span class="keyword">int</span> j = <span class="number">0</span>;</span><br><span class="line">  <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; n; i++) &#123;</span><br><span class="line">    <span class="keyword">if</span> (i &lt; j) swap(a[i], a[j]);</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> l = (n &gt;&gt; <span class="number">1</span>); (j ^= l) &lt; l; l &gt;&gt;= <span class="number">1</span>) <span class="keyword">continue</span>;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Ntt</span><span class="params">(LL* a, <span class="keyword">int</span> n, <span class="keyword">bool</span> dft)</span> </span>&#123;</span><br><span class="line">  RaderSort(a, n);</span><br><span class="line">  <span class="keyword">for</span> (<span class="keyword">int</span> len = <span class="number">2</span>; len &lt;= n; len &lt;&lt;= <span class="number">1</span>) &#123;</span><br><span class="line">    LL unit = FastPow(dft ? kPriRoot : kPriRootInv, (kMod - <span class="number">1</span>) / len);</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; n; i += len) &#123;</span><br><span class="line">      LL w = <span class="number">1</span>;</span><br><span class="line">      <span class="keyword">int</span> mid = i + (len &gt;&gt; <span class="number">1</span>);</span><br><span class="line">      <span class="keyword">for</span> (<span class="keyword">int</span> j = <span class="number">0</span>; j &lt; (len &gt;&gt; <span class="number">1</span>); j++) &#123;</span><br><span class="line">        LL tmp = w * a[mid + j] % kMod;</span><br><span class="line">        a[mid + j] = FastDec(a[i + j], tmp);</span><br><span class="line">        a[i + j] = FastAdd(a[i + j], tmp);</span><br><span class="line">        w = w * unit % kMod;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">if</span> (!dft) &#123;</span><br><span class="line">    LL inv = FastPow(n, kMod - <span class="number">2</span>);</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; n; i++)</span><br><span class="line">      a[i] = a[i] * inv % kMod;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">int</span> n, m, limit;</span><br><span class="line">LL a[kMaxN &lt;&lt; <span class="number">2</span>], b[kMaxN &lt;&lt; <span class="number">2</span>];</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">  <span class="built_in">scanf</span>(<span class="string">"%d
